name: Manifold
options:
  bundleIdPrefix: com.graviton
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

# Build configurations. Declaring `configs:` EXPLICITLY overrides XcodeGen's default Debug/Release
# pair, so all three must be listed. "Profile" is the TUNING config: optimizer on (-O) but DEBUG
# still defined, so the #if DEBUG triggers (⌃⌥L / ⌃⌥H / ⌃⌥P) and the [LIVECLOCK] / [WHEP-*]
# telemetry survive at ship-config speed. It exists to tell a real defect apart from a Debug
# -Onone artifact (cf. the ScopeCompute -Onone case).
#
# ── HOW DEBUG REACHES (AND DOES NOT REACH) THE ManifoldCore PACKAGE — TWO WRONG THEORIES FIRST ──
#
# THEORY 1, WRONG: "project-level `settings:` reaches the package." It does not. Xcode's SwiftPM
# integration synthesizes the package's targets and derives their settings from the manifest plus
# SwiftPM's own defaults; nothing in this file's `settings:` block reaches them at any level.
#
# THEORY 2, ALSO WRONG: "then set the config TYPE to `debug` and the package will follow." It does
# not follow the type either. MEASURED: with `Profile: debug`, the generated project's Profile
# configuration carried the complete debug preset (SWIFT_OPTIMIZATION_LEVEL = -Onone,
# GCC_OPTIMIZATION_LEVEL = 0, ENABLE_TESTABILITY = YES, MTL_ENABLE_DEBUG_INFO = INCLUDE_SOURCE) —
# so the flip unambiguously landed — and the package STILL compiled without DEBUG, failing with the
# same "LiveClock has no member 'setForceUnityRate'".
#
# WHAT IS ACTUALLY TRUE: Xcode maps a configuration to a SwiftPM build configuration by NAME. Only
# a configuration literally named "Debug" is built as `.debug`; every other name is `.release`,
# whatever its type. A configuration named "Profile" therefore CANNOT be given DEBUG from this file
# by any route — not by inheritance, not by type. That is the root cause, and it is not fixable here.
#
# THE FIX LIVES IN THE PACKAGE. ManifoldCore defines its own `MANIFOLD_TELEMETRY` condition in
# Packages/ManifoldCore/Package.swift, and LiveClock's guards read
# `#if DEBUG || MANIFOLD_TELEMETRY`. The package no longer depends on this file for anything.
#
# SO Profile IS BACK TO `release`-TYPE. The type flip existed only to chase THEORY 2; with that
# dead, release-type is strictly better — it gives the app -O + whole-module + -Os C for free
# (the explicit settings below are then belt-and-braces rather than load-bearing), and it lets the
# PACKAGE keep SwiftPM's own per-type optimization: -Onone under Debug (so ManifoldCore stays
# steppable, which the type flip had cost us) and -O under Profile and Release.
#
# IF YOU ADD A FOURTH CONFIG: it will be `.release` to the package no matter what you do here.
# Anything the package must know has to be expressed in Package.swift.
configs:
  Debug: debug
  Release: release
  Profile: release

# PROJECT-LEVEL settings.
#
# CORRECTION TO WHAT THIS BLOCK USED TO CLAIM. It previously asserted that setting
# SWIFT_ACTIVE_COMPILATION_CONDITIONS here "reaches the ManifoldCore SPM package", on the theory
# that Xcode's synthesized package targets inherit the project's build configuration of the same
# name. THAT IS NOT TRUE, and it was never verified — Profile had never actually been built. Xcode
# derives package-target settings from the manifest plus SwiftPM's own defaults; this block does not
# reach them at any level, and neither does the config type. The package gets its telemetry
# capability from MANIFOLD_TELEMETRY, which it defines itself in Package.swift — see the `configs:`
# block above for the measured evidence.
#
# WHAT THIS BLOCK IS ACTUALLY FOR: the APP target's inherited base, and specifically the
# `MANIFOLD_CONFIG_*` flags that let the running binary name its own configuration (BuildInfo.swift).
# Debug and Release have no target-level override of this key and take these values as-is; Profile
# restates them at target level and so must repeat both symbols (see the note there).
#
# CONFIG-NAME FLAGS. Each config also injects a `MANIFOLD_CONFIG_<NAME>` compilation condition, so
# the running binary can NAME its own configuration instead of the log leaving it to be inferred.
# Swift compilation conditions are booleans, not strings, so one flag per config is the only way to
# carry the name into `#if`. BuildInfo.swift turns these into the startup `[BUILD]` line and
# cross-checks them against a runtime optimization probe — see there.
#
# DEBUG MUST BE RESTATED in the Debug and Profile lists: assigning this key REPLACES the value the
# config-type preset would have supplied, so omitting DEBUG here would silently strip it. That is
# the same replace-not-append trap the GCC_PREPROCESSOR_DEFINITIONS note at the target level warns
# about, and it is why Release's list deliberately has no DEBUG while the other two do.
settings:
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG MANIFOLD_CONFIG_DEBUG
    Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: MANIFOLD_CONFIG_RELEASE MANIFOLD_SWIFT_WMO
    Profile:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG MANIFOLD_CONFIG_PROFILE

packages:
  ManifoldCore:
    path: Packages/ManifoldCore

# Shared scheme so `xcodebuild -scheme Manifold` (and Xcode) resolve the ManifoldCore package
# and build correctly. Declared explicitly so it survives project regeneration.
#
# ── EVERY ACTION'S CONFIG IS PINNED HERE, AND THIS FILE IS THE ONLY PLACE THAT DECIDES ────────
#
# The .xcodeproj is XcodeGen-generated and gitignored, so `xcodegen generate` REBUILDS the scheme
# from this block every time. Changing the run configuration in Xcode's scheme editor is therefore
# not a durable act — it is overwritten on the next regenerate with no warning and no diff, because
# the file it was written to is not tracked. If a config should be the default, it has to be HERE.
#
# `run` was previously pinned to Debug, which is -Onone: every ⌘R build was unoptimized, and any
# performance number taken from one is meaningless. It is now Profile — optimizer on (Swift -O +
# whole-module, C -Os) with DEBUG still defined for the APP, and MANIFOLD_TELEMETRY carrying the
# same capability into the ManifoldCore package, so the ⌃⌥L / ⌃⌥H triggers and the [LIVECLOCK] /
# [WHEP-*] telemetry all survive at ship-config speed.
#
# `profile` (Instruments) was pinned to Release, which does NOT define DEBUG. Under Release the
# WHEP stack does not merely go quiet — App/WebRTC/{WHEPClient,WHEPVideoDecoder,WHEPFrameRouter}.swift
# and App/Live/SyntheticLiveSource.swift are each wrapped in `#if DEBUG` in their ENTIRETY, so the
# code is not compiled in at all and ⌃⌥H / ⌃⌥L do nothing. Instruments could not have profiled the
# live path under that config. Now Profile, for the same reason as `run`.
#
# `archive` stays Release: that is the shipping configuration and DEBUG must be absent from it.
# `analyze` stays Debug: the analyzer wants the unoptimized IR, and it emits no timings.
schemes:
  Manifold:
    build:
      targets:
        Manifold: all
    run:
      config: Profile
    profile:
      config: Profile
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Manifold:
    type: application
    platform: macOS
    sources:
      - App
      # DeckLink SDK dispatch glue (the plain one — NOT the DeckLinkAPIDispatch_vXX legacy
      # variants). Compiled directly into the target; provides CreateDeckLinkIteratorInstance +
      # the IID constants. The installed Desktop Video driver is the runtime — no dylib to link.
      - path: docs/BlackmagicDeckLinkSDK16.0/Mac/include/DeckLinkAPIDispatch.cpp
        group: DeckLink/SDK
    dependencies:
      - package: ManifoldCore
    info:
      path: App/Info.generated.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Movie
            LSItemContentTypes:
              - public.movie
              - public.video
              - com.apple.quicktime-movie
              - public.mpeg-4
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.graviton.manifold
        PRODUCT_NAME: Manifold
        # App icon: the "AppIcon" set in App/Assets.xcassets (globbed via `sources: [App]`).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Graviton Tools"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.video"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        # Developer ID team (Amigo Media LLC). Automatic signing resolves the
        # "Developer ID Application" identity from this team for Release/notarization.
        DEVELOPMENT_TEAM: 8UQ7MDM87B
        # Hardened-runtime library-validation exception: Manifold dlopens the NDI runtime
        # (/usr/local/lib/libndi.dylib) and CFBundle-loads the DeckLink system framework
        # (/Library/Frameworks/DeckLinkAPI.framework), both signed by a different Team ID.
        # Without this, hardened runtime rejects loading them. Committed file (see App/), not
        # XcodeGen's inline `entitlements:`, so the entitlements are transparent & version-controlled.
        CODE_SIGN_ENTITLEMENTS: App/Manifold.entitlements
        # Manifold is an Apple Silicon–only app (native Metal, Float16 pixel paths).
        # Building x86_64 fails on Float16 conversions and serves no tester (all Apple Silicon).
        ARCHS: arm64
        # C++ dialect, PINNED — do not let this fall back to an XcodeGen/Xcode default again.
        # It was previously unset, which silently resolved to gnu++14 while libdatachannel is
        # C++17 — a real mismatch on both the version AND the GNU-extensions axis.
        #
        # `c++17` here emits `-std=c++17`. scripts/build_libdatachannel.sh
        # passes CMAKE_CXX_STANDARD=17 + CMAKE_CXX_EXTENSIONS=OFF, which emits the IDENTICAL
        # `-std=c++17` (confirmed by configuring a probe project — with EXTENSIONS=ON CMake emits
        # `-std=gnu++17` instead, which would NOT match). One dialect, one libc++, one binary.
        #
        # Both app C++ TUs (DeckLinkBridge.mm, DeckLinkAPIDispatch.cpp) were compiled at strict
        # `-std=c++17` with clang -fsyntax-only before this was changed: zero errors, so the
        # DeckLink SDK 16.0 headers need no GNU extensions.
        # If you ever change this, change CMAKE_CXX_STANDARD/CMAKE_CXX_EXTENSIONS to match.
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        CLANG_CXX_LIBRARY: libc++
        # Obj-C++ DeckLink bridge (App/DeckLink). The bridging header exposes the pure Obj-C
        # DeckLinkBridge.h to Swift; the .mm includes the C++ SDK header (resolved via the
        # DeckLink include path added to HEADER_SEARCH_PATHS below). Target is NOT sandboxed,
        # so no DeckLink entitlements are required (mach-lookup / prefs exceptions would only be
        # needed under App Sandbox — see SignalGenerator sample if that changes).
        SWIFT_OBJC_BRIDGING_HEADER: $(SRCROOT)/App/DeckLink/Manifold-Bridging-Header.h
        # Vendored static libav (ThirdParty/ffmpeg) — linked statically into the
        # app binary. Bundle-local only: no Homebrew/system ffmpeg, no rpath dylib.
        # The C bridge (CFFmpeg module) lives in ManifoldCore; these flags satisfy
        # the libav symbols at the final app link. The static archives bake into the
        # binary, so there's nothing extra to sign (no disable-library-validation
        # needed — that's only for separately-bundled dylibs).
        # The CFFmpeg clang module (in ManifoldCore) is re-scanned in the app's
        # compilation context, so the app target also needs the libav header path
        # for <libavcodec/...> to resolve when that module is (re)built here.
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/ThirdParty/ffmpeg/include
          # libdatachannel (WHEP WebRTC transport), vendored static like ffmpeg above. Exposes
          # <rtc/rtc.h> to App/WebRTC/DataChannelBridge.m ONLY — that header is pure C, so nothing
          # here reaches Swift or forces the target's C++ standard up. Project-local path; there is
          # deliberately no /opt/homebrew or /usr/local entry anywhere in this list.
          - $(SRCROOT)/ThirdParty/libdatachannel/include
          # Bridge header, so the bridging header can #import "DataChannelBridge.h" from App/WebRTC.
          - $(SRCROOT)/App/WebRTC
          # DeckLink SDK headers (DeckLinkAPI.h et al.) for the .mm bridge + dispatch.cpp.
          - $(SRCROOT)/docs/BlackmagicDeckLinkSDK16.0/Mac/include
          # NDI bridge header, so the bridging header can #import "NDIBridge.h" from App/DeckLink.
          - $(SRCROOT)/App/NDI
          # NDI SDK headers, referenced AT THEIR SYSTEM PATH — the SDK's license does not permit
          # vendoring them, so nothing NDI-derived is copied into or committed to this repo. The
          # runtime dylib is NOT linked either: NDIBridge.mm dlopens it, so the app still launches
          # on a machine with no NDI installed. (Quoted: the path contains spaces.)
          - '"/Library/NDI SDK for Apple/include"'
        # EXACT project-local static-lib directories, and NOTHING else. There is intentionally no
        # /opt/homebrew/lib and no /usr/local/lib here: the linker must never be able to see a
        # Homebrew OpenSSL, SRTP, or (critically) a Homebrew ffmpeg, which would silently displace
        # the custom LGPL static libav in ThirdParty/ffmpeg. Verify after every link with the
        # `otool -L` check in ThirdParty/libdatachannel/README.md.
        # NOTE: libdatachannel deliberately adds NOTHING here. Its seven archives are named by
        # EXACT ABSOLUTE PATH in OTHER_LDFLAGS below, so the linker is never given a search
        # directory for them and cannot substitute a same-named library from anywhere else.
        # Only the pre-existing ffmpeg entry remains.
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/ThirdParty/ffmpeg/lib
        # rtc/rtc.h keys RTC_C_EXPORT off RTC_STATIC. A no-op on Darwin, but the static build sets
        # it as a PUBLIC definition, so we match it rather than depend on the platform accident.
        GCC_PREPROCESSOR_DEFINITIONS:
          - $(inherited)
          - RTC_STATIC=1
        OTHER_LDFLAGS:
          - $(inherited)
          - -lavformat
          - -lavcodec
          - -lavutil
          - -lswscale
          - -lswresample
          # libdatachannel (WHEP transport) + its bundled deps + the Mbed TLS DTLS backend.
          #
          # Named by EXACT ABSOLUTE PATH, not `-L` + `-l`. This is the strongest available
          # guarantee for the brew-isolation requirement: with no search directory involved,
          # there is no lookup for a Homebrew or /usr/local copy to win. If an archive is
          # missing the link fails loudly with that exact path, rather than silently resolving
          # elsewhere. Each entry is single-quoted YAML wrapping double quotes because SRCROOT
          # contains spaces ("Vibe Code Output") — verified to survive xcodebuild's OTHER_LDFLAGS
          # splitting by building a probe target from a path with spaces.
          #
          # Order matters for static linking: datachannel depends on juice/srtp2/usrsctp, and
          # srtp2 + mbedtls depend on mbedcrypto, so each provider follows its consumers.
          #
          # libdatachannel needs NO ffmpeg — it is transport + depacketize only
          # (bring-your-own-decoder) — so nothing here touches the custom static libav archives.
          - '"$(SRCROOT)/ThirdParty/libdatachannel/lib/libdatachannel.a"'
          - '"$(SRCROOT)/ThirdParty/libdatachannel/lib/libjuice.a"'
          - '"$(SRCROOT)/ThirdParty/libdatachannel/lib/libsrtp2.a"'
          - '"$(SRCROOT)/ThirdParty/libdatachannel/lib/libusrsctp.a"'
          - '"$(SRCROOT)/ThirdParty/libdatachannel/lib/libmbedtls.a"'
          - '"$(SRCROOT)/ThirdParty/libdatachannel/lib/libmbedx509.a"'
          - '"$(SRCROOT)/ThirdParty/libdatachannel/lib/libmbedcrypto.a"'
          # C++ runtime for libdatachannel's C++17 objects. Already pulled in by the DeckLink
          # C++ (DeckLinkBridge.mm / DeckLinkAPIDispatch.cpp) — stated explicitly so the app links
          # ONE libc++, which is what keeps DeckLink C++ and libdatachannel C++ ABI-compatible.
          - -lc++
          - -lz
          - -lbz2
          - -liconv
          - -framework
          - CoreFoundation
          - -framework
          - CoreServices
          - -framework
          - Security
      # Per-config overrides. "Profile" = Release optimization + DEBUG defined, so the #if DEBUG
      # harness triggers and [LIVECLOCK] telemetry survive at -O. Run the ⌃⌥L harness under this
      # config to see whether the fps sag is a Debug -Onone artifact rather than a real defect.
      # Debug and Release inherit their standard XcodeGen presets unchanged.
      configs:
        Profile:
          # ── MEASUREMENT CODEGEN, STATED EXPLICITLY ───────────────────────────────────────
          #
          # Profile is `release`-type, so each of these matches what the preset would supply anyway.
          # They are kept EXPLICIT rather than inherited because this config's entire purpose is to
          # produce trustworthy numbers, and "what optimization was that measured at" should be
          # answerable from this file without knowing Xcode's preset table. If a measurement looks
          # wrong, this is the list to check first.
          #
          # These do NOT reach ManifoldCore — no target-level setting reaches a package target. The
          # package takes SwiftPM's own per-type optimization, which is -O for every configuration
          # not named "Debug" (see the `configs:` note at the top).
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          # Whole-module, not the debug default of per-file. Without this, -O optimizes each file in
          # isolation: no cross-file inlining or specialization, which is a large part of what -O
          # buys and would make this config measure something that is neither Debug nor Release.
          SWIFT_COMPILATION_MODE: wholemodule
          # NOTE: the matching MANIFOLD_SWIFT_WMO flag lives in SWIFT_ACTIVE_COMPILATION_CONDITIONS
          # below — it has to be a compilation CONDITION to be visible to `#if`, not a build setting.
          # Change it on the same edit as the line above; it is the one field of the [BUILD] banner
          # that is DECLARED rather than observed (Swift exposes no macro for the compilation mode,
          # unlike -O via assert and the C level via __OPTIMIZE__).
          # `-enable-testing` (the debug-type default) preserves internal symbols and suppresses
          # some optimizations. Nothing here needs @testable, and a measurement config must not
          # carry that penalty.
          ENABLE_TESTABILITY: NO
          # C/OBJC OPTIMIZATION — EXPLICIT, AND THE REASON IT MUST STAY THAT WAY. If this config is
          # ever switched to debug-type again, the C-family default becomes GCC_OPTIMIZATION_LEVEL = 0
          # and this line is the only thing standing between us and -O0 C. The hottest code in the
          # WHEP path is C and ObjC:
          # App/WebRTC/H264Depacketizer.c receives every RTP packet and App/WebRTC/DataChannelBridge.m
          # produces the arrival timestamps the entire jitter/underrun measurement rests on. At -O0
          # those numbers are not meaningful, and the Swift-side probe in BuildInfo.swift CANNOT see
          # it — assert's autoclosure observes the Swift level only. Hence the separate C probe in
          # App/BuildInfoC.c, which reads __OPTIMIZE__/__OPTIMIZE_SIZE__ from the real compilation.
          #
          # `s` (= -Os) is what Xcode's release-type preset gives, so Profile and Release compile
          # the C sources identically. Also applies to the two .mm bridges
          # (DeckLinkBridge.mm, NDIBridge.mm) and DeckLinkAPIDispatch.cpp.
          GCC_OPTIMIZATION_LEVEL: s
          # Keep DEBUG defined for BOTH Swift (#if DEBUG) and C/ObjC (#ifdef DEBUG) so the harness
          # triggers + telemetry compile in exactly as they do in Debug.
          #
          # This is the APP's DEBUG only. Nothing here reaches the ManifoldCore package — not this
          # key, not the project-level block, not the config type. The package defines its own
          # MANIFOLD_TELEMETRY in Package.swift. See the correction at the top of this file.
          #
          # MANIFOLD_CONFIG_PROFILE MUST BE REPEATED HERE. A target-level value SHADOWS the
          # project-level one for the same key — it does not merge — so listing only DEBUG here
          # would strip the config-name flag from the app target while leaving it on the package,
          # and BuildInfo would report configuration=Unknown in the one config we most need named.
          # Debug and Release have no target-level override of this key and so inherit the
          # project-level lists intact; Profile is the only config that has to restate them.
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG MANIFOLD_CONFIG_PROFILE MANIFOLD_SWIFT_WMO
          GCC_PREPROCESSOR_DEFINITIONS:
            - $(inherited)
            - DEBUG=1
            # NOTE: a per-config GCC_PREPROCESSOR_DEFINITIONS REPLACES the target-base list
            # wholesale ($(inherited) resolves to the project level, not to `settings.base`), so
            # every base definition must be restated here. RTC_STATIC comes from base — without
            # this line Profile would build the libdatachannel bridge without it.
            - RTC_STATIC=1
          # Dev-iteration niceties (this is a tuning config, not a shipping one): build only the
          # active arch and skip dSYM generation for faster turnaround.
          ONLY_ACTIVE_ARCH: YES
          DEBUG_INFORMATION_FORMAT: dwarf
