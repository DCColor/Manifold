name: Manifold
options:
  bundleIdPrefix: com.graviton
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  ManifoldCore:
    path: Packages/ManifoldCore

targets:
  Manifold:
    type: application
    platform: macOS
    sources:
      - App
    dependencies:
      - package: ManifoldCore
    info:
      path: App/Info.generated.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Movie
            LSItemContentTypes:
              - public.movie
              - public.video
              - com.apple.quicktime-movie
              - public.mpeg-4
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.graviton.manifold
        PRODUCT_NAME: Manifold
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Graviton Tools"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.video"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        # Vendored static libav (ThirdParty/ffmpeg) — linked statically into the
        # app binary. Bundle-local only: no Homebrew/system ffmpeg, no rpath dylib.
        # The C bridge (CFFmpeg module) lives in ManifoldCore; these flags satisfy
        # the libav symbols at the final app link. The static archives bake into the
        # binary, so there's nothing extra to sign (no disable-library-validation
        # needed — that's only for separately-bundled dylibs).
        # The CFFmpeg clang module (in ManifoldCore) is re-scanned in the app's
        # compilation context, so the app target also needs the libav header path
        # for <libavcodec/...> to resolve when that module is (re)built here.
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/ThirdParty/ffmpeg/include
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/ThirdParty/ffmpeg/lib
        OTHER_LDFLAGS:
          - $(inherited)
          - -lavformat
          - -lavcodec
          - -lavutil
          - -lswscale
          - -lswresample
          - -lz
          - -lbz2
          - -liconv
          - -framework
          - CoreFoundation
          - -framework
          - CoreServices
          - -framework
          - Security
